<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Analysis Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans">

    <div class="max-w-5xl mx-auto p-6">
        <header class="flex justify-between items-end mb-8 border-b border-slate-700 pb-6">
            <div>
                <h1 id="stock-name" class="text-4xl font-extrabold text-white">Stock Name</h1>
                <p id="stock-ticker" class="text-xl text-slate-400">Ticker</p>
            </div>
            <div class="text-right">
                <p class="text-sm text-slate-500 italic">Last Updated: <span id="update-date">-</span></p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                <p class="text-slate-400 text-sm mb-1">종합 점수 (Total Score)</p>
                <p id="total-score" class="text-5xl font-black text-yellow-400">0</p>
            </div>
            <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                <p class="text-slate-400 text-sm mb-1">매수 적격 (Conviction)</p>
                <p id="conviction" class="text-3xl font-bold text-green-400">-</p>
            </div>
            <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                <p class="text-slate-400 text-sm mb-1">현재가 (Price)</p>
                <p id="current-price" class="text-3xl font-bold text-white">$ 0.00</p>
            </div>
        </div>

        <div class="bg-slate-800/30 rounded-2xl border border-slate-700 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-700/50 text-slate-300">
                    <tr>
                        <th class="p-4 font-semibold">항목 (Criteria)</th>
                        <th class="p-4 font-semibold text-center">수치 (Value)</th>
                        <th class="p-4 font-semibold text-right">상태 (Status)</th>
                    </tr>
                </thead>
                <tbody id="analysis-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // data.json 파일을 읽어서 화면에 표시하는 로직
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('stock-name').innerText = data.name;
                document.getElementById('stock-ticker').innerText = data.ticker;
                document.getElementById('total-score').innerText = data.score + "점";
                document.getElementById('conviction').innerText = data.conviction;
                document.getElementById('current-price').innerText = data.price;
                document.getElementById('update-date').innerText = data.date;

                const tableBody = document.getElementById('analysis-body');
                data.details.forEach(item => {
                    const row = `
                        <tr class="border-t border-slate-700/50 hover:bg-slate-700/20 transition">
                            <td class="p-4">
                                <span class="block font-medium">${item.name_kr}</span>
                                <span class="text-xs text-slate-500 uppercase">${item.name_en}</span>
                            </td>
                            <td class="p-4 text-center font-mono text-blue-400">${item.value}</td>
                            <td class="p-4 text-right">
                                <span class="px-3 py-1 rounded-full text-xs font-bold ${item.color}">
                                    ${item.status}
                                </span>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            });
    </script>
</body>
</html>
